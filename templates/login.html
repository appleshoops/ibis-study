{% extends 'base.html' %}   
{% block title %}Login - Smart Study Quiz App{% endblock %}
{% block content %}
        <form method="POST" action="{{ url_for('login') }}">
            {{ form.csrf_token }}
            <h2>Login</h2>
            <p>Username <br>
                {{ form.username() }}</p>
            <p>Password <br>
                {{ form.password() }} </br>
            <p>{{ form.submit() }}</p>

        </form>
{% endblock %}
